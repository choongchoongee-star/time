<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>시간 가계부</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="시간 가계부" />
<meta name="theme-color" content="#4f46e5" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #8e8e93;
    --line: #e5e5ea;
    --accent: #4f46e5;
    --danger: #ef4444;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --muted: #98989f;
      --line: #38383a;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  body { padding-bottom: calc(96px + var(--safe-bottom)); }

  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: calc(12px + var(--safe-top)) 16px 8px;
    border-bottom: 1px solid var(--line);
  }
  .datebar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .datebar .nav {
    width: 40px; height: 40px; border: none; border-radius: 50%;
    background: var(--card); color: var(--text); font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .datebar .dateinfo { text-align: center; flex: 1; }
  .datebar .dateinfo .d { font-size: 18px; font-weight: 700; }
  .datebar .dateinfo .w { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .total {
    margin-top: 10px; text-align: center;
    font-size: 14px; color: var(--muted);
  }
  .total b { color: var(--accent); font-size: 16px; }

  main { padding: 12px 16px; }
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin: 18px 4px 8px; text-transform: uppercase; letter-spacing: 0.4px;
  }

  /* entry list */
  .entry {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 8px;
  }
  .entry .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .entry .body { flex: 1; min-width: 0; }
  .entry .body .top { display: flex; justify-content: space-between; gap: 8px; }
  .entry .cat { font-weight: 600; }
  .entry .dur { font-weight: 600; color: var(--accent); white-space: nowrap; }
  .entry .sub { font-size: 13px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .empty { text-align: center; color: var(--muted); padding: 28px 0; font-size: 14px; }

  /* summary bars */
  .summary-toggle { display: flex; gap: 6px; margin: 0 4px 10px; }
  .summary-toggle button {
    flex: 1; padding: 8px; border: none; border-radius: 10px;
    background: var(--card); color: var(--muted); font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .summary-toggle button.active { background: var(--accent); color: #fff; }
  .barrow { margin-bottom: 12px; }
  .barrow .lab { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
  .barrow .lab .name { font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .barrow .lab .name .dot { width: 10px; height: 10px; border-radius: 50%; }
  .barrow .lab .val { color: var(--muted); }
  .bartrack { height: 9px; background: var(--line); border-radius: 6px; overflow: hidden; }
  .barfill { height: 100%; border-radius: 6px; transition: width .3s ease; }

  /* floating add button */
  .fab {
    position: fixed; right: 20px; bottom: calc(20px + var(--safe-bottom)); z-index: 20;
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 32px; line-height: 1;
    box-shadow: 0 6px 20px rgba(79,70,229,0.45); cursor: pointer;
  }

  /* modal sheet */
  .overlay {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(0,0,0,0.4); display: none;
    align-items: flex-end; justify-content: center;
  }
  .overlay.show { display: flex; }
  .sheet {
    background: var(--card); width: 100%; max-width: 520px;
    border-radius: 20px 20px 0 0; padding: 18px 18px calc(18px + var(--safe-bottom));
    max-height: 90vh; overflow-y: auto;
    animation: slideup .25s ease;
  }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet h2 { margin: 0 0 16px; font-size: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); color: var(--text); font-size: 16px; font-family: inherit;
  }
  .field textarea { resize: none; }
  .timegrid { display: flex; gap: 10px; }
  .timegrid .field { flex: 1; }
  .catpick { display: flex; flex-wrap: wrap; gap: 8px; }
  .catpick .chip {
    padding: 9px 14px; border-radius: 20px; border: 2px solid transparent;
    background: var(--bg); font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .catpick .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .catpick .chip.sel { border-color: var(--text); }
  .row-btns { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.ghost { background: var(--bg); color: var(--text); }
  .btn.danger { background: transparent; color: var(--danger); }

  /* category manager */
  .catmgr-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .catmgr-item .dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .catmgr-item .nm { flex: 1; }
  .catmgr-item .del { background: none; border: none; color: var(--danger); font-size: 14px; cursor: pointer; }
  .addcat { display: flex; gap: 8px; margin-top: 12px; }
  .addcat input { flex: 1; padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 16px; }
  .addcat input[type=color] { width: 48px; padding: 4px; flex: none; }
  .addcat button { padding: 0 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }

  .toollink { background: none; border: none; color: var(--accent); font-size: 14px; cursor: pointer; padding: 4px; }
  .toolbar { display: flex; justify-content: center; gap: 18px; margin-top: 22px; }
</style>
</head>
<body>
<header>
  <div class="datebar">
    <button class="nav" id="prevDay" aria-label="이전 날">‹</button>
    <div class="dateinfo">
      <div class="d" id="dateLabel">—</div>
      <div class="w" id="weekLabel"></div>
    </div>
    <button class="nav" id="nextDay" aria-label="다음 날">›</button>
  </div>
  <div class="total">기록 시간 <b id="dayTotal">0분</b> · 남은 시간 <span id="dayLeft">24시간</span></div>
</header>

<main>
  <div class="section-title">오늘의 기록</div>
  <div id="entryList"></div>

  <div class="section-title">카테고리별 요약</div>
  <div class="summary-toggle">
    <button data-range="day" class="active">오늘</button>
    <button data-range="week">이번 주</button>
  </div>
  <div id="summary"></div>

  <div class="toolbar">
    <button class="toollink" id="manageCats">카테고리 관리</button>
    <button class="toollink" id="exportData">백업 내보내기</button>
    <button class="toollink" id="importData">불러오기</button>
  </div>
</main>

<button class="fab" id="addBtn" aria-label="기록 추가">+</button>

<!-- Add/Edit entry sheet -->
<div class="overlay" id="entryOverlay">
  <div class="sheet">
    <h2 id="entryTitle">기록 추가</h2>
    <div class="field">
      <label>카테고리</label>
      <div class="catpick" id="catPick"></div>
    </div>
    <div class="timegrid">
      <div class="field">
        <label>시작</label>
        <input type="time" id="startTime" />
      </div>
      <div class="field">
        <label>종료</label>
        <input type="time" id="endTime" />
      </div>
    </div>
    <div class="total" id="durPreview" style="text-align:left;margin:-6px 4px 12px">소요 시간 —</div>
    <div class="field">
      <label>메모 (선택)</label>
      <textarea id="memo" rows="1" placeholder="무엇을 했나요?"></textarea>
    </div>
    <div class="row-btns">
      <button class="btn ghost" id="cancelEntry">취소</button>
      <button class="btn primary" id="saveEntry">저장</button>
    </div>
    <div class="row-btns" id="deleteRow" style="display:none">
      <button class="btn danger" id="deleteEntry">이 기록 삭제</button>
    </div>
  </div>
</div>

<!-- Category manager sheet -->
<div class="overlay" id="catOverlay">
  <div class="sheet">
    <h2>카테고리 관리</h2>
    <div id="catMgrList"></div>
    <div class="addcat">
      <input type="color" id="newCatColor" value="#4f46e5" />
      <input type="text" id="newCatName" placeholder="새 카테고리 이름" maxlength="12" />
      <button id="addCatBtn">추가</button>
    </div>
    <div class="row-btns" style="margin-top:18px">
      <button class="btn ghost" id="closeCatMgr">닫기</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json" style="display:none" />

<script>
(function () {
  "use strict";

  // ---------- storage ----------
  var LS_ENTRIES = "tlb_entries_v1";
  var LS_CATS = "tlb_categories_v1";

  var DEFAULT_CATS = [
    { id: "c_sleep", name: "수면", color: "#6366f1" },
    { id: "c_work", name: "일", color: "#0ea5e9" },
    { id: "c_study", name: "공부", color: "#22c55e" },
    { id: "c_exercise", name: "운동", color: "#f97316" },
    { id: "c_rest", name: "휴식", color: "#a855f7" },
    { id: "c_meal", name: "식사", color: "#eab308" },
    { id: "c_etc", name: "기타", color: "#94a3b8" }
  ];

  function load(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) { return fallback; }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }

  var entries = load(LS_ENTRIES, []);
  var categories = load(LS_CATS, null);
  if (!categories || !categories.length) {
    categories = DEFAULT_CATS.slice();
    save(LS_CATS, categories);
  }

  // ---------- date helpers ----------
  var selectedDate = new Date();
  selectedDate.setHours(0, 0, 0, 0);

  function ymd(d) {
    var y = d.getFullYear();
    var m = ("0" + (d.getMonth() + 1)).slice(-2);
    var day = ("0" + d.getDate()).slice(-2);
    return y + "-" + m + "-" + day;
  }
  var WEEK = ["일", "월", "화", "수", "목", "금", "토"];
  function dateLabelText(d) {
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.round((d - today) / 86400000);
    if (diff === 0) return "오늘";
    if (diff === -1) return "어제";
    if (diff === 1) return "내일";
    return (d.getMonth() + 1) + "월 " + d.getDate() + "일";
  }
  // Monday-start week range containing date d
  function weekRange(d) {
    var start = new Date(d);
    var dow = (start.getDay() + 6) % 7; // 0 = Monday
    start.setDate(start.getDate() - dow);
    start.setHours(0,0,0,0);
    var end = new Date(start);
    end.setDate(start.getDate() + 6);
    return { start: ymd(start), end: ymd(end) };
  }

  function minutesBetween(start, end) {
    // "HH:MM" -> minutes; if end <= start treat as overnight (+24h)
    var sp = start.split(":"), ep = end.split(":");
    var sm = parseInt(sp[0], 10) * 60 + parseInt(sp[1], 10);
    var em = parseInt(ep[0], 10) * 60 + parseInt(ep[1], 10);
    var diff = em - sm;
    if (diff <= 0) diff += 1440;
    return diff;
  }
  function fmtDur(min) {
    var h = Math.floor(min / 60), m = min % 60;
    if (h && m) return h + "시간 " + m + "분";
    if (h) return h + "시간";
    return m + "분";
  }

  function catById(id) {
    for (var i = 0; i < categories.length; i++) if (categories[i].id === id) return categories[i];
    return { id: id, name: "(삭제됨)", color: "#94a3b8" };
  }

  // ---------- rendering ----------
  var el = function (id) { return document.getElementById(id); };

  function render() {
    el("dateLabel").textContent = dateLabelText(selectedDate);
    el("weekLabel").textContent =
      (selectedDate.getMonth() + 1) + "월 " + selectedDate.getDate() + "일 (" + WEEK[selectedDate.getDay()] + ")";
    renderEntries();
    renderSummary();
  }

  function dayEntries(dateStr) {
    return entries
      .filter(function (e) { return e.date === dateStr; })
      .sort(function (a, b) { return a.start < b.start ? -1 : a.start > b.start ? 1 : 0; });
  }

  function renderEntries() {
    var list = el("entryList");
    var ds = ymd(selectedDate);
    var items = dayEntries(ds);
    var total = items.reduce(function (s, e) { return s + e.minutes; }, 0);
    el("dayTotal").textContent = fmtDur(total) === "0분" ? "0분" : fmtDur(total);
    var left = 1440 - total;
    el("dayLeft").textContent = left <= 0 ? "0분" : fmtDur(left);

    if (!items.length) {
      list.innerHTML = '<div class="empty">기록이 없어요.<br>+ 버튼으로 추가해 보세요.</div>';
      return;
    }
    list.innerHTML = items.map(function (e) {
      var c = catById(e.category);
      var memo = e.memo ? " · " + escapeHtml(e.memo) : "";
      return '<div class="entry" data-id="' + e.id + '">' +
        '<span class="dot" style="background:' + c.color + '"></span>' +
        '<div class="body"><div class="top">' +
          '<span class="cat">' + escapeHtml(c.name) + '</span>' +
          '<span class="dur">' + fmtDur(e.minutes) + '</span>' +
        '</div>' +
        '<div class="sub">' + e.start + " – " + e.end + memo + '</div>' +
        '</div></div>';
    }).join("");
    Array.prototype.forEach.call(list.querySelectorAll(".entry"), function (node) {
      node.addEventListener("click", function () { openEntry(node.getAttribute("data-id")); });
    });
  }

  var summaryRange = "day";
  function renderSummary() {
    var container = el("summary");
    var subset;
    if (summaryRange === "day") {
      var ds = ymd(selectedDate);
      subset = entries.filter(function (e) { return e.date === ds; });
    } else {
      var wr = weekRange(selectedDate);
      subset = entries.filter(function (e) { return e.date >= wr.start && e.date <= wr.end; });
    }
    var totals = {};
    var grand = 0;
    subset.forEach(function (e) {
      totals[e.category] = (totals[e.category] || 0) + e.minutes;
      grand += e.minutes;
    });
    if (!grand) {
      container.innerHTML = '<div class="empty">기록이 쌓이면 여기에 비율이 보여요.</div>';
      return;
    }
    var rows = Object.keys(totals).map(function (cid) {
      return { cat: catById(cid), min: totals[cid] };
    }).sort(function (a, b) { return b.min - a.min; });

    container.innerHTML = rows.map(function (r) {
      var pct = Math.round((r.min / grand) * 100);
      return '<div class="barrow">' +
        '<div class="lab"><span class="name"><span class="dot" style="background:' + r.cat.color + '"></span>' +
          escapeHtml(r.cat.name) + '</span>' +
        '<span class="val">' + fmtDur(r.min) + ' · ' + pct + '%</span></div>' +
        '<div class="bartrack"><div class="barfill" style="width:' + pct + '%;background:' + r.cat.color + '"></div></div>' +
        '</div>';
    }).join("");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- entry sheet ----------
  var editingId = null;
  var pickedCat = null;

  function buildCatPick() {
    var wrap = el("catPick");
    wrap.innerHTML = categories.map(function (c) {
      return '<div class="chip" data-id="' + c.id + '">' +
        '<span class="dot" style="background:' + c.color + '"></span>' + escapeHtml(c.name) + '</div>';
    }).join("");
    Array.prototype.forEach.call(wrap.querySelectorAll(".chip"), function (chip) {
      chip.addEventListener("click", function () {
        pickedCat = chip.getAttribute("data-id");
        Array.prototype.forEach.call(wrap.querySelectorAll(".chip"), function (c) { c.classList.remove("sel"); });
        chip.classList.add("sel");
      });
    });
  }
  function selectCatChip(id) {
    pickedCat = id;
    Array.prototype.forEach.call(el("catPick").querySelectorAll(".chip"), function (c) {
      c.classList.toggle("sel", c.getAttribute("data-id") === id);
    });
  }

  function nowHM(offsetMin) {
    var d = new Date();
    if (offsetMin) d = new Date(d.getTime() + offsetMin * 60000);
    return ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2);
  }

  function openEntry(id) {
    buildCatPick();
    if (id) {
      var e = entries.filter(function (x) { return x.id === id; })[0];
      if (!e) return;
      editingId = id;
      el("entryTitle").textContent = "기록 수정";
      selectCatChip(e.category);
      el("startTime").value = e.start;
      el("endTime").value = e.end;
      el("memo").value = e.memo || "";
      el("deleteRow").style.display = "flex";
    } else {
      editingId = null;
      el("entryTitle").textContent = "기록 추가";
      selectCatChip(categories[0].id);
      el("startTime").value = nowHM(-30);
      el("endTime").value = nowHM(0);
      el("memo").value = "";
      el("deleteRow").style.display = "none";
    }
    updateDurPreview();
    el("entryOverlay").classList.add("show");
  }
  function closeEntry() { el("entryOverlay").classList.remove("show"); }

  function updateDurPreview() {
    var s = el("startTime").value, en = el("endTime").value;
    if (s && en) el("durPreview").textContent = "소요 시간 " + fmtDur(minutesBetween(s, en));
    else el("durPreview").textContent = "소요 시간 —";
  }

  function genId() {
    return "e_" + selectedDate.getTime() + "_" + entries.length + "_" + Math.floor(performance.now() * 1000 % 100000);
  }

  function saveEntry() {
    var s = el("startTime").value, en = el("endTime").value;
    if (!pickedCat) { alert("카테고리를 선택해 주세요."); return; }
    if (!s || !en) { alert("시작/종료 시각을 입력해 주세요."); return; }
    var mins = minutesBetween(s, en);
    var memo = el("memo").value.trim();
    if (editingId) {
      entries = entries.map(function (e) {
        if (e.id !== editingId) return e;
        return { id: e.id, date: e.date, category: pickedCat, start: s, end: en, minutes: mins, memo: memo };
      });
    } else {
      entries.push({ id: genId(), date: ymd(selectedDate), category: pickedCat, start: s, end: en, minutes: mins, memo: memo });
    }
    save(LS_ENTRIES, entries);
    closeEntry();
    render();
  }

  function deleteEntry() {
    if (!editingId) return;
    if (!confirm("이 기록을 삭제할까요?")) return;
    entries = entries.filter(function (e) { return e.id !== editingId; });
    save(LS_ENTRIES, entries);
    closeEntry();
    render();
  }

  // ---------- category manager ----------
  function openCatMgr() { renderCatMgr(); el("catOverlay").classList.add("show"); }
  function closeCatMgr() { el("catOverlay").classList.remove("show"); }
  function renderCatMgr() {
    var list = el("catMgrList");
    list.innerHTML = categories.map(function (c) {
      return '<div class="catmgr-item" data-id="' + c.id + '">' +
        '<span class="dot" style="background:' + c.color + '"></span>' +
        '<span class="nm">' + escapeHtml(c.name) + '</span>' +
        '<button class="del">삭제</button></div>';
    }).join("");
    Array.prototype.forEach.call(list.querySelectorAll(".catmgr-item"), function (node) {
      node.querySelector(".del").addEventListener("click", function () {
        var id = node.getAttribute("data-id");
        if (categories.length <= 1) { alert("카테고리는 최소 1개는 있어야 해요."); return; }
        if (!confirm("이 카테고리를 삭제할까요?\n(기존 기록은 '삭제됨'으로 표시돼요.)")) return;
        categories = categories.filter(function (c) { return c.id !== id; });
        save(LS_CATS, categories);
        renderCatMgr();
        render();
      });
    });
  }
  function addCat() {
    var name = el("newCatName").value.trim();
    var color = el("newCatColor").value;
    if (!name) { alert("이름을 입력해 주세요."); return; }
    categories.push({ id: "c_" + Math.floor(performance.now() * 1000) + "_" + categories.length, name: name, color: color });
    save(LS_CATS, categories);
    el("newCatName").value = "";
    renderCatMgr();
    render();
  }

  // ---------- backup ----------
  function exportData() {
    var payload = { version: 1, exportedAt: new Date().toISOString(), categories: categories, entries: entries };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "시간가계부-백업-" + ymd(new Date()) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data.entries || !data.categories) throw new Error("형식이 올바르지 않아요.");
        if (!confirm("불러오면 현재 데이터를 덮어씁니다. 계속할까요?")) return;
        entries = data.entries;
        categories = data.categories;
        save(LS_ENTRIES, entries);
        save(LS_CATS, categories);
        render();
        alert("불러오기 완료!");
      } catch (e) {
        alert("불러오기 실패: " + e.message);
      }
    };
    reader.readAsText(file);
  }

  // ---------- events ----------
  el("prevDay").addEventListener("click", function () {
    selectedDate.setDate(selectedDate.getDate() - 1); render();
  });
  el("nextDay").addEventListener("click", function () {
    selectedDate.setDate(selectedDate.getDate() + 1); render();
  });
  el("dateLabel").addEventListener("click", function () {
    selectedDate = new Date(); selectedDate.setHours(0,0,0,0); render();
  });

  el("addBtn").addEventListener("click", function () { openEntry(null); });
  el("saveEntry").addEventListener("click", saveEntry);
  el("cancelEntry").addEventListener("click", closeEntry);
  el("deleteEntry").addEventListener("click", deleteEntry);
  el("startTime").addEventListener("input", updateDurPreview);
  el("endTime").addEventListener("input", updateDurPreview);
  el("entryOverlay").addEventListener("click", function (ev) { if (ev.target === this) closeEntry(); });

  Array.prototype.forEach.call(document.querySelectorAll(".summary-toggle button"), function (btn) {
    btn.addEventListener("click", function () {
      summaryRange = btn.getAttribute("data-range");
      Array.prototype.forEach.call(document.querySelectorAll(".summary-toggle button"), function (b) {
        b.classList.toggle("active", b === btn);
      });
      renderSummary();
    });
  });

  el("manageCats").addEventListener("click", openCatMgr);
  el("closeCatMgr").addEventListener("click", closeCatMgr);
  el("addCatBtn").addEventListener("click", addCat);
  el("catOverlay").addEventListener("click", function (ev) { if (ev.target === this) closeCatMgr(); });

  el("exportData").addEventListener("click", exportData);
  el("importData").addEventListener("click", function () { el("importFile").click(); });
  el("importFile").addEventListener("change", function () {
    if (this.files && this.files[0]) importData(this.files[0]);
    this.value = "";
  });

  // service worker (offline)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }

  render();
})();
</script>
</body>
</html>
